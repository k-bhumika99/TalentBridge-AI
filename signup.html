<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — TalentBridge AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="public-body">

  <nav class="public-nav">
    <a href="{{ url_for('home') }}" class="brand" style="text-decoration:none;">
      <span class="brand-icon">⟳</span>
      TalentBridge AI
    </a>
    <div class="public-nav-links">
      {% if session.get('user_id') %}
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline btn-sm">Dashboard</a>
      {% endif %}
      <span style="font-size:13px; color: var(--muted);">Already have an account?</span>
      <a href="{{ url_for('signin') }}" class="btn btn-outline btn-sm">Sign In</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-icon">⟳</span> TalentBridge AI
      </div>
      <h1>Create your account</h1>
      <p class="auth-sub">Set up your HR recruiter workspace in seconds</p>

      {% if error %}
        <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form class="auth-form" method="POST" action="{{ url_for('signup') }}">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Jane Doe"
                 value="{{ form.get('name','') }}" required>
        </div>
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com"
                 value="{{ form.get('email','') }}" required>
        </div>
        <div class="form-group">
          <label for="company">Company <span style="color:var(--muted); font-weight:400;">(optional)</span></label>
          <input type="text" id="company" name="company" placeholder="TalentBridge AI"
                 value="{{ form.get('company','') }}">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <div class="auth-divider">or</div>
      <div class="social-row">
        <button class="social-btn" type="button" onclick="showToastDemo()">Google</button>
        <button class="social-btn" type="button" onclick="showToastDemo()">LinkedIn</button>
      </div>

      <div class="auth-foot">
        Already have an account? <a href="{{ url_for('signin') }}">Sign in</a>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
    function showToastDemo() {
      showToast('Social signup is a demo placeholder', 'error');
    }
  </script>
</body>
</html>
